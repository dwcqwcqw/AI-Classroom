<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台风形成条件模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #38bdf8;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid white;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
        }
    </style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const katexOptions = {
        delimiters: [
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError: false,
        strict: false,
        trust: true
    };

    let renderTimeout;
    function safeRender() {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => {
            renderMathInElement(document.body, katexOptions);
        }, 100);
    }

    renderMathInElement(document.body, katexOptions);

    const observer = new MutationObserver((mutations) => {
        let shouldRender = false;
        mutations.forEach((mutation) => {
            if (mutation.target &&
                mutation.target.className &&
                typeof mutation.target.className === 'string' &&
                mutation.target.className.includes('katex')) {
                return;
            }
            shouldRender = true;
        });

        if (shouldRender) {
            safeRender();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    setInterval(() => {
        const text = document.body.innerText;
        if (text.includes('\\(') || text.includes('$$')) {
            safeRender();
        }
    }, 2000);
});
</script>
</head>
<body class="min-h-screen flex flex-col p-3 sm:p-6 md:p-8">
    
    <header class="text-center mb-4 sm:mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400">
            台风形成条件模拟器
        </h1>
        <p class="text-slate-400 text-xs sm:text-sm mt-1 sm:mt-2">调节环境变量，探索气旋生成的奥秘</p>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto flex flex-col lg:grid lg:grid-cols-3 lg:gap-6">
        
        <!-- Mobile: Visualization on top, Desktop: Right side -->
        <div class="lg:col-span-2 lg:order-2 relative bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 shadow-2xl" style="height: 45vh; min-height: 280px;">
            <canvas id="typhoonCanvas" class="w-full h-full"></canvas>
            
            <!-- Overlay Info -->
            <div class="absolute top-3 right-3 sm:top-4 sm:right-4 text-right pointer-events-none">
                <div id="eye-pressure" class="text-lg sm:text-2xl font-mono text-white opacity-80">1008 hPa</div>
                <div id="wind-speed" class="text-xs sm:text-sm font-mono text-blue-400">12 m/s</div>
            </div>

            <!-- Coordinate Info -->
            <div class="absolute bottom-3 left-3 sm:bottom-4 sm:left-4 pointer-events-none flex gap-3 sm:gap-4 text-[9px] sm:text-[10px] text-slate-500 uppercase tracking-widest">
                <span>北半球模拟</span>
                <span id="lat-indicator">纬度: 15°N</span>
            </div>
        </div>

        <!-- Mobile: Controls at bottom, Desktop: Left side -->
        <div class="lg:col-span-1 lg:order-1 flex flex-col gap-4 mt-4 lg:mt-0 overflow-y-auto" style="height: 50vh; min-height: 320px;">
            <!-- Status Box - Mobile optimized -->
            <div id="status-card" class="glass-panel p-3 sm:p-4 rounded-xl border-l-4 border-blue-500 transition-all">
                <h3 class="font-bold text-sm mb-1">系统状态</h3>
                <p id="status-text" class="text-sm text-slate-300">正在初始化...</p>
            </div>

            <!-- Controls -->
            <div class="glass-panel p-4 sm:p-6 rounded-2xl space-y-5 sm:space-y-6 flex-1">
                <!-- Temperature -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs sm:text-sm font-medium">海面温度 (SST)</label>
                        <span id="val-temp" class="text-orange-400 font-mono text-sm">28.0°C</span>
                    </div>
                    <input type="range" id="input-temp" min="20" max="35" step="0.1" value="28" 
                        class="w-full h-3 sm:h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    <p class="text-[9px] sm:text-[10px] text-slate-500">临界值: \(26.5^\circ\text{C}\)</p>
                </div>

                <!-- Latitude -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs sm:text-sm font-medium">地理纬度 (\(\phi\))</label>
                        <span id="val-lat" class="text-blue-400 font-mono text-sm">15°N</span>
                    </div>
                    <input type="range" id="input-lat" min="0" max="30" step="0.5" value="15" 
                        class="w-full h-3 sm:h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    <p class="text-[9px] sm:text-[10px] text-slate-500">地转偏向力: \(f = 2\Omega\sin\phi\)</p>
                </div>

                <!-- Humidity -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs sm:text-sm font-medium">环境湿度 (RH)</label>
                        <span id="val-hum" class="text-teal-400 font-mono text-sm">80%</span>
                    </div>
                    <input type="range" id="input-hum" min="30" max="100" step="1" value="80" 
                        class="w-full h-3 sm:h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer slider-thumb">
                    <p class="text-[9px] sm:text-[10px] text-slate-500">潜热释放: \(Q = Lm\)</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-4 sm:mt-6 lg:mt-8 text-center px-2 max-w-2xl mx-auto">
        <div class="text-[10px] sm:text-xs text-slate-500 leading-relaxed">
            核心物理机制：气压梯度力驱动空气向中心辐合，随之受到地转偏向力作用产生旋转。
            上升气流中水汽凝结释放潜热 \(Q=Lm\) 提供动力。
            在赤道附近（\(< 5^\circ\)），由于 \(\sin\phi \approx 0\)，无法形成有效旋转。
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('typhoonCanvas');
        const ctx = canvas.getContext('2d');
        
        const inputs = {
            temp: document.getElementById('input-temp'),
            lat: document.getElementById('input-lat'),
            hum: document.getElementById('input-hum')
        };

        const displays = {
            temp: document.getElementById('val-temp'),
            lat: document.getElementById('val-lat'),
            hum: document.getElementById('val-hum'),
            status: document.getElementById('status-text'),
            statusCard: document.getElementById('status-card'),
            pressure: document.getElementById('eye-pressure'),
            wind: document.getElementById('wind-speed'),
            latInd: document.getElementById('lat-indicator')
        };

        let particles = [];
        let rotationAngle = 0;
        let formationStrength = 0;
        let lastCanvasSize = { width: 0, height: 0 };

        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            // Only reinitialize if size changed significantly
            if (Math.abs(rect.width - lastCanvasSize.width) > 5 || 
                Math.abs(rect.height - lastCanvasSize.height) > 5) {
                
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                lastCanvasSize = { width: rect.width, height: rect.height };
                
                // Create spiral particles
                particles = [];
                const maxRadius = Math.max(rect.width, rect.height) * 0.4;
                for (let i = 0; i < 200; i++) {
                    particles.push({
                        r: Math.random() * maxRadius,
                        angle: Math.random() * Math.PI * 2,
                        size: 2 + Math.random() * 5,
                        speed: 0.5 + Math.random() * 1.5,
                        opacity: Math.random()
                    });
                }
            }
        }

        function updateSimulation() {
            const temp = parseFloat(inputs.temp.value);
            const lat = parseFloat(inputs.lat.value);
            const hum = parseFloat(inputs.hum.value);

            displays.temp.innerText = `${temp.toFixed(1)}°C`;
            displays.lat.innerText = `${lat.toFixed(1)}°N`;
            displays.hum.innerText = `${hum}%`;
            displays.latInd.innerText = `纬度: ${lat.toFixed(1)}°N`;

            // Core Logic
            const tempOK = temp >= 26.5;
            const latOK = lat >= 5;
            const humOK = hum >= 70;

            let targetStrength = 0;
            let status = "";
            let color = "border-blue-500";

            if (!tempOK) {
                status = "海温过低 (\(< 26.5^\circ\text{C}\))，无法提供足够热能。";
                targetStrength = 0;
                color = "border-red-500";
            } else if (!latOK) {
                status = "纬度过低，地转偏向力 \(f\) 近似为 0，气流无法旋转。";
                targetStrength = 0.1;
                color = "border-yellow-500";
            } else if (!humOK) {
                status = "环境干燥，水汽凝结释放的潜热不足以维持对流。";
                targetStrength = 0.2;
                color = "border-orange-500";
            } else {
                // Calculate growth strength
                targetStrength = ((temp - 26.5) / 8.5) * (hum / 100) * (lat / 30 + 0.5);
                targetStrength = Math.min(1.2, targetStrength);
                status = "条件理想，热力与动力耦合，台风正在加强。";
                color = "border-green-500";
            }

            // Smooth strength transition
            formationStrength += (targetStrength - formationStrength) * 0.05;

            displays.status.innerHTML = status;
            displays.statusCard.className = `glass-panel p-4 rounded-xl border-l-4 ${color} transition-all`;

            // Derived Physics
            const pressure = 1010 - (formationStrength * 60);
            const wind = formationStrength * 70;
            displays.pressure.innerText = `${Math.round(pressure)} hPa`;
            displays.wind.innerText = `${Math.round(wind)} m/s`;

            return { temp, lat, hum, formationStrength };
        }

        function draw(time) {
            const { lat, formationStrength } = updateSimulation();
            const rect = canvas.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const maxRadius = Math.min(rect.width, rect.height) * 0.4;

            ctx.clearRect(0, 0, rect.width, rect.height);

            // Background Ocean pulse
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 1.5);
            grad.addColorStop(0, '#1e293b');
            grad.addColorStop(1, '#0f172a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, rect.width, rect.height);

            // Rotation Logic: f = 2 * omega * sin(phi)
            const coriolisFactor = Math.sin(lat * Math.PI / 180);
            const baseRotation = 0.01 * formationStrength;
            rotationAngle -= baseRotation * (1 + coriolisFactor * 2);

            // Draw spiral clouds
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotationAngle);

            particles.forEach((p, i) => {
                // Angular momentum conservation: closer particles rotate faster
                const individualRotation = (maxRadius / (p.r + 50)) * 0.02 * formationStrength;
                const finalAngle = p.angle + (time * 0.001 * p.speed);
                
                // Convergence: particles move inward if strength > 0
                let currentR = p.r;
                if (formationStrength > 0.2) {
                    currentR = p.r * (0.8 + 0.2 * Math.cos(time * 0.001 + i));
                }

                const x = Math.cos(finalAngle) * currentR;
                const y = Math.sin(finalAngle) * currentR;

                const opacity = p.opacity * Math.min(1, formationStrength + 0.2);
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                
                // Draw blurred "cloud"
                ctx.beginPath();
                const bandEffect = Math.sin(p.r * 0.05 - finalAngle * 3);
                const sizeMult = (bandEffect > 0.5) ? 1.5 : 0.8;
                
                ctx.arc(x, y, p.size * sizeMult * (0.5 + formationStrength), 0, Math.PI * 2);
                ctx.fill();
            });

            // Eye of the storm
            if (formationStrength > 0.7) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(0, 0, 15 * (formationStrength - 0.5), 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }

            ctx.restore();

            // Pressure Gradient lines (Dynamic)
            if (formationStrength > 0.1) {
                ctx.strokeStyle = `rgba(56, 189, 248, ${formationStrength * 0.3})`;
                ctx.lineWidth = 1;
                for (let r = 50; r < maxRadius * 1.5; r += 50) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, r / (1 + formationStrength * 0.2), 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
