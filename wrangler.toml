name = "ai-classroom"
main = ".open-next/worker.js"
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "ai-classroom-db"
database_id = "d1f70870-c5f6-4e0c-83a0-3dac874a282b"

# [[kv_namespaces]]
# binding = "CACHE"
# id = "<your-kv-namespace-id>"

[[r2_buckets]]
binding = "FILES"
bucket_name = "ai-classroom-files"
