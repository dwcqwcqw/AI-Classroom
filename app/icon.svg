<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="yt-bg" x1="6" y1="4" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="0.45" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="yt-core" x1="10" y1="10" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="yt-glow" x1="16" y1="8" x2="16" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0e7ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#yt-bg)"/>
  <!-- Outer orbit -->
  <ellipse cx="16" cy="16" rx="11" ry="5.5" stroke="url(#yt-core)" stroke-width="1.1" stroke-opacity="0.55" transform="rotate(-24 16 16)"/>
  <ellipse cx="16" cy="16" rx="11" ry="5.5" stroke="url(#yt-core)" stroke-width="1.1" stroke-opacity="0.4" transform="rotate(32 16 16)"/>
  <!-- Neural core -->
  <circle cx="16" cy="16" r="5.2" fill="url(#yt-glow)"/>
  <circle cx="16" cy="16" r="3.6" fill="url(#yt-core)" fill-opacity="0.92"/>
  <!-- Nodes -->
  <circle cx="9" cy="11" r="1.35" fill="#c4b5fd"/>
  <circle cx="23" cy="12" r="1.2" fill="#7dd3fc"/>
  <circle cx="12" cy="22" r="1.15" fill="#a5b4fc"/>
  <circle cx="22" cy="21" r="1.25" fill="#38bdf8"/>
  <!-- Synaptic links -->
  <path d="M10.2 11.4L14.2 14.8M21.8 12.2L17.8 14.8M12.4 21.6L14.8 18.4M21 20.8L17.4 17.8" stroke="#e0e7ff" stroke-width="0.85" stroke-linecap="round" stroke-opacity="0.55"/>
</svg>
